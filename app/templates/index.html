{% extends "base.html" %}
{% block content %}
<section class="card hero">
  <h1>学生証をタッチしてください</h1>
  <p>この画面は打刻待受です。リーダープロセスからのAPI連携で更新されます。</p>
</section>

<section class="card" style="margin-top: 1rem;">
  <h2>ダミータッチ（実機なし検証用）</h2>
  <form method="post" action="/touch/simulate">
    <label>カードID <input name="card_id" required></label>
    <div class="touch-grid">
      <button class="btn touch-btn" type="submit" name="action" value="ENTER">入室</button>
      <button class="btn touch-btn" type="submit" name="action" value="LEAVE_TEMP">一時退出</button>
      <button class="btn touch-btn" type="submit" name="action" value="RETURN">再入室</button>
      <button class="btn touch-btn" type="submit" name="action" value="LEAVE_FINAL">最終退出</button>
    </div>
  </form>
</section>
{% endblock %}
