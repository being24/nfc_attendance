<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "NFC Attendance" }}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="/static/app.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">NFC Attendance</a>
    <nav>
      <a href="/admin/today">本日在室</a>
      <a href="/admin/students">学生</a>
      <a href="/admin/events">イベント</a>
      <a href="/admin/export">CSV出力</a>
      {% if request.session.get("admin_authenticated") %}
      <form method="post" action="/logout" style="display:inline">
        <button class="btn btn-secondary" type="submit">ログアウト</button>
      </form>
      {% else %}
      <a href="/login">ログイン</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
