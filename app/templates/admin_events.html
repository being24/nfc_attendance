{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>本日イベント一覧</h1>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>学生ID</th>
        <th>操作</th>
        <th>時刻</th>
        <th>ソース</th>
      </tr>
    </thead>
    <tbody>
      {% for e in events %}
      <tr>
        <td>{{ e.id }}</td>
        <td>{{ e.student_id }}</td>
        <td>{{ e.event_type }}</td>
        <td>{{ e.occurred_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
        <td>{{ e.source }}</td>
      </tr>
      {% else %}
      <tr><td colspan="5">イベントがありません</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
